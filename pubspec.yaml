name: infinity_kiosk
description: >
  Infinity Estate Secure Kiosk Device App
  
  A production-ready Flutter + Android application that converts a low-end Android phone
  into a single-purpose secure terminal for estate visitor verification.
  
  Built for Infinity Estate, Ajah, Lagos - Fynko Technologies

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # SECURITY: Secure storage for admin PIN (AES-256 encryption)
  flutter_secure_storage: ^9.2.0
  
  # AUTHENTICATION: Local device authentication fallback
  local_auth: ^2.2.0
  
  # STORAGE: Lightweight key-value storage for non-sensitive data
  shared_preferences: ^2.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  generate: false
